name: Build Debug APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # يسمح بتشغيل يدوي من واجهة GitHub

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout the code ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up JDK 17 ───────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Cache Gradle dependencies ───────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 4. Grant execute permission to gradlew ─────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ─── 5. Build Debug APK ──────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── 6. Upload APK as artifact ───────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BlockPuzzle-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14   # يحتفظ بالـ APK لمدة 14 يوم

      # ─── 7. (Optional) Print APK info ────────────────────────────
      - name: Print APK size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully!"
            echo "📦 Size: $(du -sh $APK_PATH | cut -f1)"
            echo "📍 Path: $APK_PATH"
          else
            echo "❌ APK not found!"
            exit 1
          fi
